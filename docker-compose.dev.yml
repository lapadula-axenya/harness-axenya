services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: xenia
      POSTGRES_PASSWORD: xenia
      POSTGRES_DB: xenia
    ports:
      - "5432:5432"
    volumes:
      - xenia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenia"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  xenia-pgdata:
